<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbar Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar" role="toolbar">

        <!-- Grupo Formatação -->
        <button title="Negrito"><strong>B</strong></button>
        <button title="Itálico"><em>I</em></button>
        <button title="Sublinhado"><u>U</u></button>

        <div class="separator"></div>

        <!-- Grupo Alinhamento -->
        <button title="Alinhar à Esquerda">⬅</button>
        <button title="Centralizar">↔</button>
        <button title="Alinhar à Direita">➡</button>
        <button title="Justificar">☰</button>

        <div class="separator"></div>

        <!-- Grupo Cores -->
        <button title="Cor da Fonte">A</button>
        <button title="Cor de Fundo">🖍</button>
        <button title="Limpar Formatação">✖</button>

    </div>

</body>
</html>
