<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carrinho">

        <ul class="lista-carrinho">

            <li class="item">
                <img src="https://techinter.com.br/wp-content/uploads/2026/04/notebook-gamer-asus.jpg" alt="Produto">

                <div class="info">
                    <h3>Notebook Gamer</h3>
                    <p>Processador i7, 16GB RAM, SSD 512GB</p>
                </div>

                <input type="number" value="1" min="1">

                <span class="preco">R$ 4.999,00</span>

                <button>Remover</button>
            </li>

            <li class="item">
                <img src="https://cdn.awsli.com.br/254/254944/produto/174252458d0750e532e.jpg" alt="Produto">

                <div class="info">
                    <h3>Mouse Gamer</h3>
                    <p>RGB, 12000 DPI, conexão USB</p>
                </div>

                <input type="number" value="2" min="1">

                <span class="preco">R$ 199,90</span>

                <button>Remover</button>
            </li>

            <li class="item">
                <img src="https://img.terabyteshop.com.br/produto/g/teclado-mecanico-gamer-montech-mkey-pro-75-fy-rgb-wireless-bluetooth-switch-gateron-yellow-ansi-65-azul-e-branco_217432.jpg" alt="Produto">

                <div class="info">
                    <h3>Teclado Mecânico</h3>
                    <p>Switch Blue, iluminação RGB</p>
                </div>

                <input type="number" value="1" min="1">

                <span class="preco">R$ 349,90</span>

                <button>Remover</button>
            </li>

        </ul>

        <div class="total">
            <strong>Total: R$ 5.548,80</strong>
        </div>

    </div>

</body>
</html>
