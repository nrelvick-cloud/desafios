<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="products-grid">

        <div class="product-card">
            <img src="https://www.melhorescartoes.com.br/wp-content/uploads/2024/06/notebook-gamer-acer-nitro-capa-01.jpg" alt="Produto 1">
            <h3>Notebook Gamer</h3>
            <p class="price">R$ 4.999,00</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://png.pngtree.com/thumb_back/fh260/background/20240913/pngtree-rgb-gaming-mouse-with-colorful-lights-stock-photo-image_16181498.jpg" alt="Produto 2">
            <h3>Mouse Gamer</h3>
            <p class="price">R$ 199,90</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://www.notebookcheck.info/fileadmin/_processed_/0/b/csm_Epomaker-Galaxy68-review-featured_b60682fe6a.png" alt="Produto 3">
            <h3>Teclado Mecânico</h3>
            <p class="price">R$ 349,90</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/61qIS+axSdL._AC_UF894,1000_QL80_.jpg" alt="Produto 4">
            <h3>Monitor 27"</h3>
            <p class="price">R$ 1.299,00</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://img.terabyteshop.com.br/produto/g/headset-gamer-marvo-hg8959-rgb-transparente-usb35mm-branco_200476.jpg" alt="Produto 5">
            <h3>Headset RGB</h3>
            <p class="price">R$ 259,90</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://images8.kabum.com.br/produtos/fotos/sync_mirakl/195278/xlarge/Webcam-Logitech-C922-Full-HD-1080p-60FPS-Microfone-USB-Trip-Incluso-960-001087_1780337025.jpg" alt="Produto 6">
            <h3>Webcam Full HD</h3>
            <p class="price">R$ 189,90</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://mirandacomputacao.jetassets.com.br/produto/48936-principal.png" alt="Produto 7">
            <h3>SSD 1TB</h3>
            <p class="price">R$ 499,90</p>
            <button>Comprar</button>
        </div>

        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/71rpGOUI-2L._AC_UF894,1000_QL80_.jpg" alt="Produto 8">
            <h3>Cadeira Gamer</h3>
            <p class="price">R$ 1.099,00</p>
            <button>Comprar</button>
        </div>

    </div>

</body>
</html>
